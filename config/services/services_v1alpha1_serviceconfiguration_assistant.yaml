apiVersion: services.miloapis.com/v1alpha1
kind: ServiceConfiguration
metadata:
  labels:
    app.kubernetes.io/name: cloud-portal
    app.kubernetes.io/managed-by: kustomize
  name: assistant-miloapis-com
spec:
  serviceRef:
    name: assistant-miloapis-com
  phase: Published
  monitoredResourceTypes:
    - type: assistant.miloapis.com/Conversation
      displayName: Assistant Conversation
      description: |
        A single chat with the Datum Cloud AI assistant. One Conversation
        is created per top-level chat session and emits a usage event for
        each completed model response (input tokens, output tokens, and
        optional cache-read/cache-write tokens).
      gvk:
        group: assistant.miloapis.com
        kind: Conversation
      labels:
        - name: model
          description: |
            The model identifier handling the conversation (e.g.
            "claude-sonnet-4-6"). Required so per-model unit economics
            remain visible all the way to the bill.
        - name: region
          description: |
            Optional Datum deployment region serving the request. Useful for
            cost attribution when the portal is deployed in multiple regions
            or when egress charges differ per region.
  metrics:
    - name: assistant.miloapis.com/conversation/input-tokens
      displayName: Assistant Input Tokens
      description: |
        Input tokens consumed by the Datum Cloud AI assistant -- the number
        of tokens sent to the model per request. Cached input tokens are
        reported separately under cache-read-tokens and are NOT double-counted
        here.
      kind: Delta
      unit: "{token}"
      # Per-model unit economics: each model has a different cost, so the
      # rating engine prices on this dimension. The producer emits `model`
      # in data.dimensions; the central validator requires it declared here.
      dimensions:
        - model
    - name: assistant.miloapis.com/conversation/output-tokens
      displayName: Assistant Output Tokens
      description: |
        Output tokens generated by the Datum Cloud AI assistant -- the
        number of tokens produced by the model per request. Includes any
        tokens emitted by extended thinking when enabled on the underlying
        model.
      kind: Delta
      unit: "{token}"
      dimensions:
        - model
    - name: assistant.miloapis.com/conversation/cache-read-tokens
      displayName: Assistant Cache-Read Tokens
      description: |
        Tokens served from the model provider's prompt cache during an
        assistant request. Charged at a different rate than fresh input
        tokens by every provider that offers prompt caching, so they are
        metered as a distinct dimension.
      kind: Delta
      unit: "{token}"
      dimensions:
        - model
    - name: assistant.miloapis.com/conversation/cache-write-tokens
      displayName: Assistant Cache-Write Tokens
      description: |
        Tokens written to the model provider's prompt cache during an
        assistant request -- the one-time cost of populating a cached
        prefix that subsequent requests can read from. Charged at a
        premium over standard input tokens by most providers, so they
        are metered as a distinct dimension.
      kind: Delta
      unit: "{token}"
      dimensions:
        - model
    - name: assistant.miloapis.com/conversation/messages
      displayName: Assistant Messages
      description: |
        Number of completed assistant request/response cycles. Useful as
        a request-count signal for tier caps that prefer "messages per
        month" framing over raw token counts, or as a billing safety-net
        when token data is unavailable.
      kind: Delta
      unit: "{message}"
      dimensions:
        - model
  billing:
    consumerDestinations:
      - monitoredResourceType: assistant.miloapis.com/Conversation
        metrics:
          - assistant.miloapis.com/conversation/input-tokens
          - assistant.miloapis.com/conversation/output-tokens
          - assistant.miloapis.com/conversation/cache-read-tokens
          - assistant.miloapis.com/conversation/cache-write-tokens
          - assistant.miloapis.com/conversation/messages
