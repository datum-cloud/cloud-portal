apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Service catalog for the Datum Cloud AI assistant.
#
# Authors two cluster-scoped documents the services-operator uses to
# reason about the assistant:
#
#   1. The `Service` itself (`assistant-miloapis-com`), which carries
#      identity (`serviceName`), display metadata, and producer owner.
#   2. A single `ServiceConfiguration` (also `assistant-miloapis-com`,
#      same name, different Kind) that declares the Conversation
#      MonitoredResourceType, the five conversation metrics, and the
#      billing routing that turns those metrics into MeterDefinitions.
#
# Per `billing/docs/emitting-usage.md`, the `ServiceConfiguration` is
# the *only* document a producer authors for billing. The
# services-operator fans it out into `billing.miloapis.com/MeterDefinition`
# and `MonitoredResourceType` objects labelled
# `app.kubernetes.io/managed-by: services-operator`. Do not author those
# directly -- edit this `ServiceConfiguration` and let the fan-out catch
# up.
#
# Both ship in `phase: Published`. Once Published, the following are
# immutable on a `ServiceConfiguration`:
#   - `spec.metrics[].name`, `.kind`, `.unit`
#   - `spec.monitoredResourceTypes[].type`, `.gvk`
# Renames or unit changes ship as a new metric name (e.g. ".../v2").
#
# This bundle is NOT applied by the cloud-portal Deployment overlay --
# it is deployed into the services-operator's namespace by Flux from
# the infra repo (apps/cloud-portal/base/milo-services.yaml).
resources:
  - services_v1alpha1_service_assistant.yaml
  - services_v1alpha1_serviceconfiguration_assistant.yaml
