apiVersion: portal.miloapis.com/v1alpha1
kind: PortalPlugin
metadata:
  # Deterministic name = Service.spec.serviceName. In production this is written
  # by the services-operator fan-out; here we apply it directly (Tier 1) to
  # exercise the portal's watch + status pipeline against a real kube-apiserver.
  name: sample.miloapis.com
  labels:
    app.kubernetes.io/managed-by: services.miloapis.com
    services.miloapis.com/service: sample.miloapis.com
  annotations:
    discovery.miloapis.com/parent-contexts: Platform
spec:
  serviceRef:
    name: sample
  serviceName: sample.miloapis.com
  slug: sample
  displayName: Sample Plugin
  deprecated: false
  suspend: false
  assets:
    # The sample plugin dev server (task plugin:dev). Assets are fetched
    # server-side by the portal's asset proxy, so plain http://localhost is fine.
    baseURL: http://localhost:7777
    manifestPath: /plugin-manifest.json
    caBundle: ""
  proxy:
    # Declared non-Milo backend for the sample plugin's own API. The plugin calls
    # /api/plugins/sample/proxy/api/… and the portal forwards to this URL,
    # injecting the user's bearer token (authorization: UserToken). Started by
    # `task plugin:backend` (also run by plugin:dev / plugin:preview).
    - alias: api
      backend:
        url: http://localhost:7778
      authorization: UserToken
  visibility:
    # None: no ServiceEntitlement exists for a service that isn't in the remote
    # catalog, so the local sample must not be entitlement-gated.
    entitlement: None
    featureFlag: ""
    organizations: []
  contentSecurityPolicy: []
