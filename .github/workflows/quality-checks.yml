name: Code Checks & Tests

on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CYPRESS_CACHE_FOLDER: ~/.cache/Cypress

  BUN_CACHE: ~/.bun/install/cache

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Dependencies
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.BUN_CACHE }}
            **/node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock', '**/bun.lockb', '**/package.json') }}

      - name: Install
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

  lint:
    needs: install
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore Cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.BUN_CACHE }}
            **/node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock', '**/bun.lockb', '**/package.json') }}

      - name: Run Lint & Format
        run: |
          echo "Running lint check..."
          bun run lint
          echo "Running format check..."
          bun run format

  typecheck:
    needs: install
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.BUN_CACHE }}
            **/node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock', '**/bun.lockb', '**/package.json') }}

      - name: Run Typecheck
        run: bun typecheck

  build:
    needs: [lint, typecheck]
    name: Build
    runs-on: ubuntu-latest
    if: ${{ !failure() && !cancelled() }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.BUN_CACHE }}
            **/node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock', '**/bun.lockb', '**/package.json') }}

      - name: Build
        run: bun run build

      - name: Cache Build
        uses: actions/cache@v5
        with:
          path: build
          key: build-${{ github.sha }}

  unit-tests:
    needs: [build]
    name: Unit Tests
    runs-on: ubuntu-latest
    if: ${{ !failure() && !cancelled() }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Dependencies Cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.BUN_CACHE }}
            **/node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock', '**/bun.lockb', '**/package.json') }}

      - name: Setup Cypress
        run: |
          echo "Installing Cypress..."
          bunx cypress install
          echo "Verifying Cypress installation..."
          bunx cypress verify

      - name: Run Unit Tests
        env:
          NODE_ENV: test
          CYPRESS: 'true'
        run: bun run test:unit:prod

  e2e-smoke-tests:
    needs: [build]
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !failure() && !cancelled() }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Dependencies Cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.BUN_CACHE }}
            **/node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock', '**/bun.lockb', '**/package.json') }}

      - name: Restore Build Cache
        uses: actions/cache@v5
        with:
          path: build
          key: build-${{ github.sha }}

      - name: Setup Environment
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          SUB: ${{ secrets.SUB }}
          API_URL: ${{ secrets.API_URL }}
          GRAPHQL_URL: ${{ secrets.GRAPHQL_URL }}
          AUTH_OIDC_ISSUER: ${{ secrets.AUTH_OIDC_ISSUER }}
          AUTH_OIDC_CLIENT_ID: ${{ secrets.AUTH_OIDC_CLIENT_ID }}
        run: |
          cat > .env << EOF
          NODE_ENV=test
          CYPRESS=true
          APP_URL=http://localhost:3000
          API_URL=$API_URL
          GRAPHQL_URL=$GRAPHQL_URL
          AUTH_OIDC_ISSUER=$AUTH_OIDC_ISSUER
          AUTH_OIDC_CLIENT_ID=$AUTH_OIDC_CLIENT_ID
          SESSION_SECRET=$SESSION_SECRET
          LOG_LEVEL=warn
          CYPRESS_BASE_URL=http://localhost:3000
          EOF

      - name: Setup Cypress
        run: |
          echo "Installing Cypress..."
          bunx cypress install
          echo "Verifying Cypress installation..."
          bunx cypress verify

      - name: Run Smoke Tests
        env:
          NODE_ENV: test
          CYPRESS: 'true'
          CYPRESS_BASE_URL: http://localhost:3000
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          SUB: ${{ secrets.SUB }}
        run: bunx start-server-and-test 'bun run start' http://localhost:3000/_healthz 'bunx cypress run --spec "cypress/e2e/smoke/**" --config-file cypress.config.ts'

      - name: Upload Artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-smoke-artifacts-${{ github.run_id }}
          path: |
            cypress/videos
            cypress/screenshots
          retention-days: 7
          if-no-files-found: warn

  e2e-regression-tests:
    needs: [e2e-smoke-tests]
    name: E2E Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ !failure() && !cancelled() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Dependencies Cache
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.BUN_CACHE }}
            **/node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock', '**/bun.lockb', '**/package.json') }}

      - name: Restore Build Cache
        uses: actions/cache@v5
        with:
          path: build
          key: build-${{ github.sha }}

      - name: Setup Environment
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          SUB: ${{ secrets.SUB }}
          API_URL: ${{ secrets.API_URL }}
          GRAPHQL_URL: ${{ secrets.GRAPHQL_URL }}
          AUTH_OIDC_ISSUER: ${{ secrets.AUTH_OIDC_ISSUER }}
          AUTH_OIDC_CLIENT_ID: ${{ secrets.AUTH_OIDC_CLIENT_ID }}
        run: |
          cat > .env << EOF
          NODE_ENV=test
          CYPRESS=true
          APP_URL=http://localhost:3000
          API_URL=$API_URL
          GRAPHQL_URL=$GRAPHQL_URL
          AUTH_OIDC_ISSUER=$AUTH_OIDC_ISSUER
          AUTH_OIDC_CLIENT_ID=$AUTH_OIDC_CLIENT_ID
          SESSION_SECRET=$SESSION_SECRET
          LOG_LEVEL=warn
          CYPRESS_BASE_URL=http://localhost:3000
          EOF

      - name: Setup Cypress
        run: |
          echo "Installing Cypress..."
          bunx cypress install
          echo "Verifying Cypress installation..."
          bunx cypress verify

      - name: Run Regression Tests
        env:
          NODE_ENV: test
          CYPRESS: 'true'
          CYPRESS_BASE_URL: http://localhost:3000
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          SUB: ${{ secrets.SUB }}
          SPLIT: ${{ strategy.job-total }}
          SPLIT_INDEX: ${{ strategy.job-index }}
          CYPRESS_specPattern: 'cypress/e2e/regression/**/*.{cy,spec}.{js,jsx,ts,tsx}'
        run: bunx start-server-and-test 'bun run start' http://localhost:3000/_healthz 'bunx cypress run --config-file cypress.config.ts'

      - name: Upload Artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-regression-artifacts-${{ github.run_id }}-shard-${{ matrix.shard }}
          path: |
            cypress/videos
            cypress/screenshots
          retention-days: 7
          if-no-files-found: warn

  pr-comment:
    needs: [unit-tests, e2e-smoke-tests]
    name: PR Test Summary
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build test summary
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const runId = context.runId;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });

            const testJobs = jobs.jobs.filter(j =>
              j.name === 'Unit Tests' || j.name === 'E2E Smoke Tests'
            );

            const statusEmoji = (conclusion) => {
              if (!conclusion || conclusion === 'skipped') return '⏭️';
              if (conclusion === 'success') return '✅';
              if (conclusion === 'failure') return '❌';
              if (conclusion === 'cancelled') return '🚫';
              return '❓';
            };

            let table = '| Job | Status |\n|-----|--------|\n';
            for (const job of testJobs.sort((a, b) => a.name.localeCompare(b.name))) {
              table += `| ${job.name} | ${statusEmoji(job.conclusion)} ${job.conclusion || 'pending'} |\n`;
            }

            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });

            let body = `## 🧪 Test Summary\n\n${table}\n\n`;
            body += `[View workflow run](${runUrl})`;
            body += `\n\n### 📎 Artifacts\n\n`;
            if (artifacts.artifacts.length > 0) {
              body += `Videos and screenshots from failed E2E tests:\n\n`;
              for (const a of artifacts.artifacts) {
                body += `- **${a.name}** – [Download](${runUrl})\n`;
              }
            } else {
              body += `No artifacts (all tests passed). Cypress videos and screenshots are uploaded when E2E tests fail and can be downloaded from the workflow run above.\n`;
            }

            fs.writeFileSync('pr-summary.md', body);

      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: pr-summary.md
          comment-tag: quality-checks-summary
          edit-mode: replace

  status-check:
    needs: [install, lint, typecheck, build, unit-tests, e2e-smoke-tests]
    name: Final Status Check
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check Workflow Status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "❌ Workflow failed because one or more jobs failed"
            exit 1
          elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "⚠️ Workflow cancelled because one or more jobs were cancelled"
            exit 1
          else
            echo "✅ All jobs completed successfully"
          fi
